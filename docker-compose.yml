version: '3.9'
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paksentinel_api
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - ./data:/app/data
      - ./logs:/app/logs
      - ./mlruns:/app/mlruns
    environment:
      - PYTHONUNBUFFERED=1
      - MLFLOW_TRACKING_URI=sqlite:///mlflow.db
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
